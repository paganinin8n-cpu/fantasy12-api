name: CI/CD API

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fantasy12-api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  EASYPANEL_PROJECT: f12-prd
  EASYPANEL_SERVICE: api
  EASYPANEL_CODE_DIR: /etc/easypanel/projects/f12-prd/api/code
  API_HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.fantasy12.com/health' }}

jobs:
  ci:
    name: Build and release checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run CI checks
        run: npm run ci:check

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: npm run docker:build

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci, docker-build]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release source
        run: |
          set -euo pipefail
          sed -i "s/__FANTASY12_RELEASE_VERSION__/${GITHUB_SHA}/g" \
            src/lib/release-version.ts Dockerfile
          printf '%s\n' "$GITHUB_SHA" > .release-version
          mkdir -p .release
          tar --exclude-from=.deployignore -czf ".release/fantasy12-api-${GITHUB_SHA}.tgz" .

      - name: Upload release package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: ".release/fantasy12-api-${{ github.sha }}.tgz"
          target: /tmp
          strip_components: 1

      - name: Sync release into EasyPanel code directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -eu
            RELEASE="/tmp/fantasy12-api-${{ github.sha }}.tgz"
            STAGE="/tmp/fantasy12-api-${{ github.sha }}"
            CODE_DIR="${{ env.EASYPANEL_CODE_DIR }}"

            rm -rf "$STAGE"
            mkdir -p "$STAGE" "$CODE_DIR"
            tar -xzf "$RELEASE" -C "$STAGE"

            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete \
                --exclude '.env' \
                --exclude '.env.*' \
                --exclude 'node_modules' \
                --exclude 'dist' \
                "$STAGE"/ "$CODE_DIR"/
            else
              find "$CODE_DIR" -mindepth 1 -maxdepth 1 \
                ! -name '.env' \
                ! -name '.env.local' \
                -exec rm -rf {} +
              cp -a "$STAGE"/. "$CODE_DIR"/
            fi

            EXPECTED_RELEASE="${{ github.sha }}"
            ACTUAL_RELEASE="$(cat "$CODE_DIR/.release-version" 2>/dev/null || true)"
            if [ "$ACTUAL_RELEASE" != "$EXPECTED_RELEASE" ]; then
              echo "Synced release marker does not match the expected commit" >&2
              exit 1
            fi

            rm -rf "$STAGE" "$RELEASE"
            echo "Release source synced to $CODE_DIR"

      - name: Preflight production and apply database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -eu
            CODE_DIR="${{ env.EASYPANEL_CODE_DIR }}"
            API_CONTAINER="$(docker ps --filter 'name=f12-prd_api' --format '{{.ID}}' | head -n 1)"

            if [ -z "$API_CONTAINER" ]; then
              echo "Active Fantasy12 API container not found" >&2
              exit 1
            fi

            docker cp "$CODE_DIR/scripts/preflight-production-deploy.js" "$API_CONTAINER:/app/scripts/preflight-production-deploy.js"
            docker exec "$API_CONTAINER" node /app/scripts/preflight-production-deploy.js
            docker cp "$CODE_DIR/prisma/schema.prisma" "$API_CONTAINER:/app/prisma/schema.prisma"
            docker cp "$CODE_DIR/prisma/migrations/." "$API_CONTAINER:/app/prisma/migrations/"
            docker exec "$API_CONTAINER" npx prisma migrate deploy
            docker exec "$API_CONTAINER" npx prisma migrate status

      - name: Trigger EasyPanel deploy
        env:
          EASYPANEL_URL: ${{ secrets.EASYPANEL_URL }}
          EASYPANEL_EMAIL: ${{ secrets.EASYPANEL_EMAIL }}
          EASYPANEL_PASSWORD: ${{ secrets.EASYPANEL_PASSWORD }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const required = ['EASYPANEL_URL', 'EASYPANEL_EMAIL', 'EASYPANEL_PASSWORD']
          for (const name of required) {
            if (!process.env[name]) throw new Error(`${name} is required`)
          }

          const base = process.env.EASYPANEL_URL.replace(/\/$/, '')

          async function rpc(path, json, token) {
            const response = await fetch(`${base}${path}`, {
              method: 'POST',
              headers: {
                'content-type': 'application/json',
                ...(token ? { authorization: `Bearer ${token}` } : {}),
              },
              body: JSON.stringify({ json }),
            })

            const text = await response.text()
            let body
            try {
              body = text ? JSON.parse(text) : {}
            } catch {
              body = { raw: text }
            }

            if (!response.ok) {
              throw new Error(`RPC ${path} failed with ${response.status}: ${text}`)
            }

            if (body?.error) {
              const message = body.error?.message || 'unknown application error'
              throw new Error(`RPC ${path} was rejected: ${message}`)
            }

            return body
          }

          const login = await rpc('/api/rpc/auth/login', {
            email: process.env.EASYPANEL_EMAIL,
            password: process.env.EASYPANEL_PASSWORD,
            rememberMe: false,
          })

          const token = login?.json?.token
          if (!token) throw new Error('EasyPanel login did not return a token')

          await rpc('/api/rpc/services/app/deployService', {
            projectName: process.env.EASYPANEL_PROJECT || 'f12-prd',
            serviceName: process.env.EASYPANEL_SERVICE || 'api',
          }, token)

          console.log('EasyPanel deploy requested.')
          NODE

      - name: Wait for healthy API
        run: |
          set -euo pipefail
          echo "Waiting for $API_HEALTH_URL to serve release $GITHUB_SHA"
          for i in $(seq 1 36); do
            HEALTH_RESPONSE="$(curl -fsS --max-time 10 "$API_HEALTH_URL" || true)"
            if printf '%s' "$HEALTH_RESPONSE" | grep -q '"api":"ok"' \
              && printf '%s' "$HEALTH_RESPONSE" | grep -q '"db":"ok"' \
              && printf '%s' "$HEALTH_RESPONSE" | grep -q "\"version\":\"$GITHUB_SHA\""; then
              echo "API release $GITHUB_SHA is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for healthy API."
          exit 1
