name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: SCP dist compilado para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: 'dist/'
          target: /tmp/f12-api-${{ github.sha }}
          strip_components: 1

      - name: Injetar dist no container e reiniciar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            docker cp /tmp/f12-api-${{ github.sha }}/. ${{ secrets.API_CONTAINER_ID }}:/app/dist/
            docker restart ${{ secrets.API_CONTAINER_ID }}
            rm -rf /tmp/f12-api-${{ github.sha }}
            echo "Deploy concluído: ${{ github.sha }}"

      - name: Aguardar API saudável
        run: |
          echo "Aguardando API..."
          for i in $(seq 1 18); do
            if curl -sf --max-time 5 https://api.fantasy12.com/health | grep -q '"api":"ok"'; then
              echo "API OK"
              exit 0
            fi
            sleep 10
          done
          echo "Timeout aguardando API"
          exit 1
