name: Diagnose Mercado Pago payment

on:
  workflow_dispatch:
    inputs:
      transaction_id:
        description: Mercado Pago payment/transaction ID
        required: true
        type: string
      user_email:
        description: Fantasy12 user email
        required: true
        type: string

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    env:
      TRANSACTION_ID: ${{ inputs.transaction_id }}
      USER_EMAIL: ${{ inputs.user_email }}

    steps:
      - name: Read payment state
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: TRANSACTION_ID,USER_EMAIL
          script: |
            set -eu
            API_CONTAINER="$(docker ps --filter 'name=f12-prd_api' --format '{{.ID}}' | head -n 1)"
            test -n "$API_CONTAINER"
            docker exec -i \
              -e TRANSACTION_ID="$TRANSACTION_ID" \
              -e USER_EMAIL="$USER_EMAIL" \
              "$API_CONTAINER" node <<'NODE'
            const { prisma } = require('/app/dist/lib/prisma')

            async function main() {
              const transactionId = process.env.TRANSACTION_ID
              const email = process.env.USER_EMAIL.trim().toLowerCase()
              const user = await prisma.user.findUnique({
                where: { email },
                select: {
                  id: true,
                  email: true,
                  subscription: {
                    select: { plan: true, status: true, startAt: true, endAt: true, provider: true },
                  },
                  payments: {
                    orderBy: { createdAt: 'desc' },
                    take: 5,
                    select: {
                      id: true,
                      purpose: true,
                      status: true,
                      subscriptionPlan: true,
                      amountCents: true,
                      externalPaymentId: true,
                      externalReference: true,
                      externalPreferenceId: true,
                      processedAt: true,
                      createdAt: true,
                      updatedAt: true,
                    },
                  },
                },
              })

              const response = await fetch(`https://api.mercadopago.com/v1/payments/${encodeURIComponent(transactionId)}`, {
                headers: { authorization: `Bearer ${process.env.MP_ACCESS_TOKEN}` },
              })
              const mp = await response.json()
              const localPreferenceId = user?.payments?.[0]?.externalPreferenceId
              const preferenceResponse = localPreferenceId
                ? await fetch(`https://api.mercadopago.com/checkout/preferences/${encodeURIComponent(localPreferenceId)}`, {
                    headers: { authorization: `Bearer ${process.env.MP_ACCESS_TOKEN}` },
                  })
                : null
              const preference = preferenceResponse ? await preferenceResponse.json() : null
              const webhookEvents = await prisma.paymentWebhookEvent.findMany({
                where: { receivedAt: { gte: new Date(Date.now() - 24 * 60 * 60 * 1000) } },
                orderBy: { receivedAt: 'desc' },
                take: 100,
                select: { externalEventId: true, receivedAt: true, payload: true },
              })
              const matchingEvents = webhookEvents
                .filter(event => String(event.payload?.id ?? '') === transactionId)
                .map(event => ({ externalEventId: event.externalEventId, receivedAt: event.receivedAt }))
              const pendingSearches = []
              for (const payment of user?.payments?.filter(item => item.status === 'PENDING') ?? []) {
                const searchResponse = await fetch(
                  `https://api.mercadopago.com/v1/payments/search?external_reference=${encodeURIComponent(payment.externalReference)}`,
                  { headers: { authorization: `Bearer ${process.env.MP_ACCESS_TOKEN}` } }
                )
                const search = await searchResponse.json()
                pendingSearches.push({
                  localPaymentId: payment.id,
                  externalReference: payment.externalReference,
                  httpStatus: searchResponse.status,
                  results: (search.results ?? []).map(item => ({
                    id: item.id,
                    status: item.status,
                    statusDetail: item.status_detail,
                    transactionAmount: item.transaction_amount,
                    dateApproved: item.date_approved,
                  })),
                })
              }
              const recentAuditLogs = user
                ? await prisma.auditLog.findMany({
                    where: { userId: user.id },
                    orderBy: { createdAt: 'desc' },
                    take: 20,
                    select: { action: true, entity: true, entityId: true, metadata: true, createdAt: true },
                  })
                : []

              console.log(JSON.stringify({
                checkedAt: new Date().toISOString(),
                mercadoPago: {
                  httpStatus: response.status,
                  id: mp.id ?? null,
                  status: mp.status ?? null,
                  statusDetail: mp.status_detail ?? null,
                  transactionAmount: mp.transaction_amount ?? null,
                  currency: mp.currency_id ?? null,
                  externalReference: mp.external_reference ?? null,
                  preferenceId: mp.preference_id ?? null,
                  metadata: mp.metadata ?? null,
                  dateApproved: mp.date_approved ?? null,
                },
                preference: {
                  id: preference?.id ?? localPreferenceId ?? null,
                  httpStatus: preferenceResponse?.status ?? null,
                  notificationUrl: preference?.notification_url ?? null,
                },
                environment: {
                  apiPublicUrl: process.env.API_PUBLIC_URL ?? null,
                  explicitNotificationUrl: process.env.MP_NOTIFICATION_URL ?? null,
                  webhookSecretConfigured: Boolean(process.env.MP_WEBHOOK_SECRET),
                },
                user,
                matchingWebhookEvents: matchingEvents,
                pendingSearches,
                recentAuditLogs,
              }, null, 2))
            }

            main().finally(() => prisma.$disconnect())
            NODE

      - name: Read recent webhook logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -eu
            API_CONTAINER="$(docker ps --filter 'name=f12-prd_api' --format '{{.ID}}' | head -n 1)"
            test -n "$API_CONTAINER"
            docker logs --since 2h "$API_CONTAINER" 2>&1 \
              | grep -Ei 'mercado|webhook|signature|assinatura' \
              | tail -n 100 || true
