name: Production session security QA

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type RUN_SESSION_QA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: fantasy12-production-session-qa
  cancel-in-progress: false

jobs:
  session-qa:
    if: inputs.confirmation == 'RUN_SESSION_QA'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Verify shared session lifecycle and clean up
        uses: appleboy/ssh-action@v1.0.3
        env:
          QA_RUN_ID: ${{ github.run_id }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: QA_RUN_ID
          command_timeout: 12m
          script: |
            set -euo pipefail

            API_SERVICE='f12-prd_api'
            REDIS_SERVICE='f12-prd_redis'
            API_URL='https://api.fantasy12.com'
            QA_EMAIL="qa-session-${QA_RUN_ID}@example.invalid"
            QA_CPF="9$(date +%s)"
            QA_PASSWORD="Qa!$(openssl rand -hex 18)"
            QA_NEW_PASSWORD="Qb!$(openssl rand -hex 18)"
            COOKIE_ONE="/tmp/f12-session-qa-${QA_RUN_ID}-one.cookies"
            COOKIE_TWO="/tmp/f12-session-qa-${QA_RUN_ID}-two.cookies"
            COOKIE_THREE="/tmp/f12-session-qa-${QA_RUN_ID}-three.cookies"
            HEADERS="/tmp/f12-session-qa-${QA_RUN_ID}.headers"
            RESPONSE="/tmp/f12-session-qa-${QA_RUN_ID}.response"

            api_container() {
              docker ps --filter "name=${API_SERVICE}" --format '{{.ID}}' | head -n 1
            }

            wait_replicas() {
              expected="$1"
              for attempt in $(seq 1 60); do
                actual="$(docker service ls --filter "name=${2}" --format '{{.Replicas}}' | head -n 1)"
                if [ "$actual" = "${expected}/${expected}" ]; then
                  return 0
                fi
                sleep 5
              done
              echo "Service ${2} did not reach ${expected}/${expected}" >&2
              return 1
            }

            wait_service_update() {
              service="$1"
              previous_version="$2"
              for attempt in $(seq 1 60); do
                current_version="$(docker service inspect "$service" --format '{{.Version.Index}}')"
                state="$(docker service inspect "$service" --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{else}}completed{{end}}')"
                if [ "$current_version" = "$previous_version" ]; then
                  sleep 5
                  continue
                fi
                case "$state" in
                  completed) return 0 ;;
                  paused|rollback_started|rollback_paused|rollback_completed)
                    echo "Service ${service} update ended in state ${state}" >&2
                    return 1
                    ;;
                esac
                sleep 5
              done
              echo "Service ${service} update did not complete" >&2
              return 1
            }

            cleanup() {
              set +e
              cleanup_status=0
              docker service scale "${API_SERVICE}=1" >/dev/null 2>&1 || cleanup_status=1
              wait_replicas 1 "$API_SERVICE" >/dev/null 2>&1 || cleanup_status=1
              container="$(api_container)"
              if [ -n "$container" ]; then
                docker exec -i -e QA_EMAIL="$QA_EMAIL" "$container" node - <<'NODE'
            const { prisma } = require('/app/dist/lib/prisma')
            const Redis = require('ioredis')

            async function cleanupQaUser() {
              const users = await prisma.user.findMany({
                where: {
                  email: {
                    startsWith: 'qa-session-',
                    endsWith: '@example.invalid',
                  },
                },
                select: { id: true },
              })
              if (users.length === 0) return
              const redis = new Redis(process.env.REDIS_URL, {
                connectTimeout: 5000,
                maxRetriesPerRequest: 1,
              })
              try {
                for (const user of users) {
                  const indexKey = `f12:user-sessions:${user.id}`
                  const sessionIds = await redis.smembers(indexKey)
                  if (sessionIds.length > 0) {
                    await redis.del(...sessionIds.map(id => `f12:session:${id}`))
                  }
                  await redis.del(indexKey)
                }
              } catch (error) {
                console.warn(`Redis cleanup warning: ${error.name}`)
              } finally {
                await redis.quit().catch(() => redis.disconnect())
              }
              await prisma.user.deleteMany({
                where: { id: { in: users.map(user => user.id) } },
              })
            }

            cleanupQaUser()
              .catch(error => {
                console.error(error.message)
                process.exitCode = 1
              })
              .finally(() => prisma.$disconnect())
            NODE
                test "$?" = '0' || cleanup_status=1
              else
                cleanup_status=1
              fi
              rm -f "$COOKIE_ONE" "$COOKIE_TWO" "$COOKIE_THREE" "$HEADERS" "$RESPONSE" || cleanup_status=1
              set -e
              return "$cleanup_status"
            }
            trap cleanup EXIT INT TERM

            echo 'QA phase: infrastructure readiness'
            wait_replicas 1 "$API_SERVICE"
            wait_replicas 1 "$REDIS_SERVICE"
            API_CONTAINER="$(api_container)"
            test -n "$API_CONTAINER"

            ORIGIN="$(docker exec "$API_CONTAINER" node -e '
              const configured = process.env.CORS_ALLOWED_ORIGINS || process.env.FRONTEND_ORIGIN || "https://fantasy12.com"
              process.stdout.write(configured.split(",")[0].trim())
            ')"
            test -n "$ORIGIN"

            echo 'QA phase: Redis policy'
            REDIS_PASSWORD="$(docker exec "$API_CONTAINER" node -e '
              const url = new URL(process.env.REDIS_URL)
              process.stdout.write(decodeURIComponent(url.password))
            ')"
            case "$REDIS_PASSWORD" in
              *[!A-Za-z0-9_-]*|'')
                echo 'Redis password format is unsafe for service command replacement' >&2
                exit 1
                ;;
            esac
            REDIS_VERSION="$(docker service inspect "$REDIS_SERVICE" --format '{{.Version.Index}}')"
            docker service update --detach=true \
              --entrypoint redis-server \
              --args "--requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec --maxmemory-policy noeviction" \
              "$REDIS_SERVICE" >/dev/null
            wait_service_update "$REDIS_SERVICE" "$REDIS_VERSION"
            wait_replicas 1 "$REDIS_SERVICE"
            docker exec "$API_CONTAINER" node -e '
              const Redis = require("ioredis")
              const redis = new Redis(process.env.REDIS_URL, {
                connectTimeout: 5000,
                maxRetriesPerRequest: 1,
              })
              Promise.all([
                redis.config("GET", "appendonly"),
                redis.config("GET", "appendfsync"),
                redis.config("GET", "maxmemory-policy"),
              ]).then(values => {
                const config = Object.fromEntries(values)
                if (config.appendonly !== "yes") throw new Error("Redis appendonly is not yes")
                if (config.appendfsync !== "everysec") throw new Error("Redis appendfsync is not everysec")
                if (config["maxmemory-policy"] !== "noeviction") throw new Error("Redis policy is not noeviction")
                console.log("Redis policy verified")
              })
                .catch(error => {
                  console.error(`${error.name}: ${error.message}`)
                  process.exitCode = 1
                })
                .finally(() => redis.quit())
            '

            echo 'QA phase: synthetic account creation'
            status="$(curl -sS -o "$RESPONSE" -w '%{http_code}' \
              -H 'Content-Type: application/json' \
              --data "{\"name\":\"Session QA\",\"nickname\":\"sessionqa${QA_RUN_ID}\",\"email\":\"${QA_EMAIL}\",\"cpf\":\"${QA_CPF}\",\"phone\":\"5599999999999\",\"password\":\"${QA_PASSWORD}\"}" \
              "${API_URL}/api/users")"
            if [ "$status" != '201' ]; then
              echo "Synthetic account creation returned HTTP ${status}" >&2
              head -c 500 "$RESPONSE" >&2
              exit 1
            fi

            login() {
              password="$1"
              cookie_file="$2"
              status="$(curl -sS -D "$HEADERS" -o "$RESPONSE" -w '%{http_code}' \
                -c "$cookie_file" \
                -H 'Content-Type: application/json' \
                --data "{\"email\":\"${QA_EMAIL}\",\"password\":\"${password}\"}" \
                "${API_URL}/api/auth/login")"
              if [ "$status" != '200' ]; then
                echo "Login returned HTTP ${status}" >&2
                head -c 500 "$RESPONSE" >&2
                return 1
              fi
              grep -qi 'set-cookie: f12\.session=' "$HEADERS"
              grep -qi 'HttpOnly' "$HEADERS"
              grep -qi 'Secure' "$HEADERS"
              grep -qi 'SameSite=None' "$HEADERS"
            }

            authenticated_me() {
              cookie_file="$1"
              expected="$2"
              status="$(curl -sS -o "$RESPONSE" -w '%{http_code}' \
                -b "$cookie_file" "${API_URL}/api/me")"
              test "$status" = "$expected"
            }

            verify_redis_policy() {
              enforce="$1"
              API_CONTAINER="$(api_container)"
              test -n "$API_CONTAINER"
              docker exec -e REDIS_ENFORCE="$enforce" "$API_CONTAINER" node -e '
                const Redis = require("ioredis")
                const redis = new Redis(process.env.REDIS_URL, {
                  connectTimeout: 5000,
                  maxRetriesPerRequest: 1,
                })
                const desired = {
                  appendonly: "yes",
                  appendfsync: "everysec",
                  "maxmemory-policy": "noeviction",
                }

                async function readConfig() {
                  const values = await Promise.all(
                    Object.keys(desired).map(key => redis.config("GET", key))
                  )
                  return Object.fromEntries(values)
                }

                async function main() {
                  let config = await readConfig()
                  if (process.env.REDIS_ENFORCE === "true") {
                    for (const [key, value] of Object.entries(desired)) {
                      if (config[key] !== value) await redis.config("SET", key, value)
                    }
                    await redis.config("REWRITE")
                    config = await readConfig()
                  }
                  for (const [key, value] of Object.entries(desired)) {
                    if (config[key] !== value) throw new Error(`Redis ${key} is not ${value}`)
                  }
                  console.log("Redis policy verified")
                }

                main()
                  .catch(error => {
                    console.error(`${error.name}: ${error.message}`)
                    process.exitCode = 1
                  })
                  .finally(() => redis.quit())
              '
            }

            echo 'QA phase: independent login sessions'
            login "$QA_PASSWORD" "$COOKIE_ONE"
            login "$QA_PASSWORD" "$COOKIE_TWO"
            SID_ONE="$(awk '$6 == "f12.session" { print $7 }' "$COOKIE_ONE")"
            SID_TWO="$(awk '$6 == "f12.session" { print $7 }' "$COOKIE_TWO")"
            test -n "$SID_ONE"
            test -n "$SID_TWO"
            test "$SID_ONE" != "$SID_TWO"
            authenticated_me "$COOKIE_ONE" '200'
            sleep 2

            echo 'QA phase: Redis restart persistence'
            REDIS_VERSION="$(docker service inspect "$REDIS_SERVICE" --format '{{.Version.Index}}')"
            docker service update --detach=true --force "$REDIS_SERVICE" >/dev/null
            wait_service_update "$REDIS_SERVICE" "$REDIS_VERSION"
            wait_replicas 1 "$REDIS_SERVICE"
            for attempt in $(seq 1 30); do
              if authenticated_me "$COOKIE_ONE" '200' 2>/dev/null; then
                break
              fi
              if [ "$attempt" = '30' ]; then
                echo 'Session did not survive Redis restart' >&2
                exit 1
              fi
              sleep 2
            done
            verify_redis_policy 'false'

            echo 'QA phase: API restart persistence'
            API_VERSION="$(docker service inspect "$API_SERVICE" --format '{{.Version.Index}}')"
            docker service update --detach=true --force "$API_SERVICE" >/dev/null
            wait_service_update "$API_SERVICE" "$API_VERSION"
            wait_replicas 1 "$API_SERVICE"
            for attempt in $(seq 1 30); do
              if authenticated_me "$COOKIE_ONE" '200' 2>/dev/null; then
                break
              fi
              if [ "$attempt" = '30' ]; then
                echo 'Session did not survive API restart' >&2
                exit 1
              fi
              sleep 2
            done

            echo 'QA phase: two-replica shared sessions'
            docker service scale "${API_SERVICE}=2" >/dev/null
            wait_replicas 2 "$API_SERVICE"
            SESSION_COOKIE="$(awk '$6 == "f12.session" { print $7 }' "$COOKIE_ONE")"
            CONTAINER_COUNT=0
            for container in $(docker ps --filter "name=${API_SERVICE}" --format '{{.ID}}'); do
              ip="$(docker inspect -f '{{range .NetworkSettings.Networks}}{{println .IPAddress}}{{end}}' "$container" | head -n 1)"
              test -n "$ip"
              status="$(curl -sS -o "$RESPONSE" -w '%{http_code}' \
                -H "Cookie: f12.session=${SESSION_COOKIE}" \
                "http://${ip}:3001/api/me")"
              test "$status" = '200'
              CONTAINER_COUNT=$((CONTAINER_COUNT + 1))
            done
            test "$CONTAINER_COUNT" = '2'
            docker service scale "${API_SERVICE}=1" >/dev/null
            wait_replicas 1 "$API_SERVICE"

            echo 'QA phase: password-change revocation'
            status="$(curl -sS -D "$HEADERS" -o "$RESPONSE" -w '%{http_code}' \
              -b "$COOKIE_ONE" -c "$COOKIE_ONE" \
              -H "Origin: ${ORIGIN}" \
              -H 'Content-Type: application/json' \
              --data "{\"currentPassword\":\"${QA_PASSWORD}\",\"newPassword\":\"${QA_NEW_PASSWORD}\"}" \
              "${API_URL}/api/me/password")"
            test "$status" = '200'
            authenticated_me "$COOKIE_TWO" '401'

            echo 'QA phase: logout cookie deletion'
            login "$QA_NEW_PASSWORD" "$COOKIE_THREE"
            status="$(curl -sS -D "$HEADERS" -o "$RESPONSE" -w '%{http_code}' \
              -b "$COOKIE_THREE" -c "$COOKIE_THREE" \
              -H "Origin: ${ORIGIN}" \
              -H 'Content-Type: application/json' \
              -X POST "${API_URL}/api/auth/logout")"
            test "$status" = '200'
            grep -qi 'set-cookie: f12\.session=;' "$HEADERS"
            grep -qi 'Path=/' "$HEADERS"
            grep -qi 'HttpOnly' "$HEADERS"
            grep -qi 'Secure' "$HEADERS"
            grep -qi 'SameSite=None' "$HEADERS"
            authenticated_me "$COOKIE_THREE" '401'

            echo 'QA phase: cleanup'
            cleanup
            trap - EXIT INT TERM
            echo 'Production session security QA passed and synthetic account removed.'
